<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"
        crossorigin="anonymous" />
        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/products.css">
</head>

<body style="background-color: #eee;">
    <div class="dashboard d-flex">
        <!-- Sidebar injected here -->
        <div id="navbar-container"></div>

        <!-- Main content -->
        <main class="flex-grow-1 p-4" style="min-width: 0px;">
            <div class="container">
                <header class="category-header d-flex flex-column flex-lg-row justify-content-between align-items-start align-lg-center mb-3">
                    <div>
                        <h2 class="fw-bolder">Categories</h2>
                        <p class="" style="color: var(--secondary-color);">Manage your product Categories</p>
                    </div>
                    <button class="btn addBtn" data-bs-toggle="modal" data-bs-target="#addProductModal">
                        <i class="fas fa-plus me-3"></i> Add Category
                    </button>
                </header>

                <div class="bg-white rounded-3 ps-3 pt-4 pb-5 border border-secondary-subtle"
                    style="box-shadow:var(--shadow)">
                    <h3 class="fw-bolder">All Categories</h3>
                    <p class="pb-2" style="color: var(--secondary-color) ; ">A list of all product categories in your inventory (8 total)</p>
                    <div class="table-responsive">
                        <table class="table  align-middle">
                            <tbody class="table-body">
                                <tr>
                                    <th>Category Name</th>
                                    <th>Description</th>
                                    <th>Products</th>
                                    <th>Action</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>

            </div>



            <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-md p3">
                    <div class="modal-content" style="background-color:var(--bg-color)">
                        <div class="modal-header border-0 pb-0">
                            <div>
                                <h5 class="modal-title" id="addProductModalLabel">Add New Category</h5>
                                <small class="text-muted">Create a new product category.</small>
                            </div>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="myForm">
                                <div class="row mb-5">
                                    <div class="col-md-12 ">
                                        <label class="form-label fw-semibold">Category Name</label>
                                        <input style="background-color:var(--bg-color)" type="text" class="form-control input-name"
                                            placeholder="Enter category Name" required>
                                    </div>
                                </div>
                                <div class="row mb-5">
                                    <div class="col-md-12">
                                        <label class="form-label fw-semibold">Description</label>
                                        <textarea style="background-color:var(--bg-color)" type="text" class="form-control input-description"
                                            placeholder="Enter category Description" required></textarea>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end">
                                    <button type="button" class="btn btn-light text-black me-2"
                                        data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-send" style="background-color:var(--add-btn-color); color:var(--bg-boxes-color);">
                                        <i class="fas fa-save me-2"></i> Add Category
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>




        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
        <script>
             fetch("navbar.html")
                .then((res) => res.text())
                .then((html) => {
                    document.getElementById("navbar-container").innerHTML = html;

                    const currentPage = window.location.pathname.split("/").pop();
                    const navLink = document.querySelector(`.nav-item a[href='./${currentPage}']`);
                    if (navLink) {
                        navLink.style.cssText =" background-color: #1C222B; color: #fff";
                    }
                });
        </script>
        <script type="module" src="../js/features/categories.js"></script>
</body>

</html>
