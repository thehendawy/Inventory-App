<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body>
    <div class="dashboard d-flex">
      <!-- Sidebar injected here -->
      <div id="navbar-container"></div>

      <!-- Main content -->
      <main class="flex-grow-1 p-4">
        <div class="page-header mb-4">
          <h1>Dashboard</h1>
          <p>Welcome back! Here is an overview of your inventory.</p>
        </div>

        <!-- Cards -->
        <div class="row g-3 mb-4">
          <!-- Products -->
          <div class="col-12 col-sm-6 col-xl-3">
            <div class="status-card">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="status-title">Total Products</div>
                  <div class="status-value total-products"></div>
                </div>
                <div class="status-icon-wrap icon-blue">
                  <i class="fa-solid fa-box"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- Suppliers -->
          <div class="col-12 col-sm-6 col-xl-3">
            <div class="status-card">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="status-title">Total Suppliers</div>
                  <div class="status-value total-suppliers"></div>
                </div>
                <div class="status-icon-wrap icon-green">
                  <i class="fa-solid fa-truck"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- Low Stock Items -->
          <div class="col-12 col-sm-6 col-xl-3">
            <div class="status-card">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="status-title">Low Stock Items</div>
                  <div class="status-value low-stock"></div>
                </div>
                <div class="status-icon-wrap icon-red">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
              </div>
            </div>
          </div>

          <!-- Inventory Value -->
          <div class="col-12 col-sm-6 col-xl-3">
            <div class="status-card">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="status-title">Inventory Value</div>
                  <div class="status-value total-price"></div>
                </div>
                <div class="status-icon-wrap icon-orange">
                  <i class="fa-solid fa-dollar-sign"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Low Stock Table -->
        <div class="section-card">
          <div class="section-title">
            <i class="fa-solid fa-triangle-exclamation text-warning"></i>
            Low Stock Alert
          </div>
          <div class="section-subtitle">Products that need to be reordered</div>

          <div class="table-section">
            <table class="in-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>SKU</th>
                  <th class="text-center">Stock</th>
                  <th class="text-end">Reorder</th>
                </tr>
              </thead>
              <tbody class="table_body">

              </tbody>
            </table>
          </div>
        </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      fetch("./navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          document.querySelector(
            ".nav-item a[href='./dashboard.html']",
          ).style.cssText = `background-color: #1C222B; color: #fff`;
        });
    </script>
