<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Adjustment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <script src="../js/auth/authentication.js"></script>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/inventory.css" />
  </head>
  <body>
    <div
      class="suppliers d-flex min-vh-100"
      style="background-color: var(--bg-color)"
    >
      <div id="navbar-container"></div>

      <main class="flex-grow-1 p-4" style="min-width: 0">
        <div class="suppliers">
          <!-- inventory header -->
          <div
            class="suppliers-head border-bottom border-1 border-opacity-25 d-flex flex-column flex-sm-row align-items-sm-center justify-content-sm-between"
          >
            <div class="text-md-start text-center">
              <h1 class="fs-3 fw-bold mb-0">Stock Adjustment</h1>
              <p class="text-secondary">Manage stock levels</p>
            </div>
          </div>

          <!-- inventory search area -->
          <div
            class="search-area py-4 px-3 py-md-4 shadow-lg border border-1 border-opacity-50 rounded-3 mt-3"
          >
            <div class="position-relative">
              <i
                class="fa-solid fa-search position-absolute top-50 translate-middle-y text-secondary"
                style="left: 15px"
              ></i>
              <input
                class="form-control ps-5 py-2"
                type="search"
                placeholder="Search products..."
                aria-label="Search input"
                style="max-width: 450px"
                id="searchProducts"
              />
            </div>
          </div>

          <!-- inventory content -->
          <div class="suppliers-content mt-4 bg-white shadow-lg p-4 rounded-2">
            <div class="content-header">
              <h3 class="h5 fw-semibold">Stock Levels</h3>
              <p class="mb-0">Current inventory items</p>
            </div>

            <div class="table-responsive">
              <table class="table text-nowrap table-hover mt-3">
                <thead>
                  <tr>
                    <th scope="col">Product</th>
                    <th scope="col">SKU</th>
                    <th scope="col">Category</th>
                    <th scope="col">Quantity</th>
                    <th scope="col">Reorder</th>
                    <th scope="col">Actions</th>
                  </tr>
                </thead>
                <tbody id="stockBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal for handle stock adjustment -->
    <div
      class="modal fade"
      id="inventoryInputs"
      tabindex="-1"
      aria-labelledby="inventoryInputs"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header px-4 py-3 border-bottom">
            <div>
              <h1
                class="modal-title fw-semibold fs-5"
                id="handleInventoryLabel"
              >
                Adjust Stock
              </h1>
              <p style="font-size: 13px" class="mb-0 text-muted">
                Update stock quantity
              </p>
            </div>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body px-4 py-4">
            <!-- Current Stock Display -->
            <div class="text-center mb-4">
              <div class="text-muted" style="font-size: 13px">
                Current Stock
              </div>
              <div
                class="fw-bold"
                style="font-size: 2rem"
                id="currentStockDisplay"
              >
                -
              </div>
            </div>

            <!-- Adjustment Type -->
            <div class="mb-3">
              <label class="form-label fw-medium">Adjustment Type</label>
              <div class="d-flex gap-2">
                <button
                  type="button"
                  class="btn btn-primary flex-fill"
                  id="btnAdd"
                >
                  <i class="fa-solid fa-plus me-1"></i> Add
                </button>
                <button
                  type="button"
                  class="btn btn-outline-secondary flex-fill"
                  id="btnRemove"
                >
                  <i class="fa-solid fa-minus me-1"></i> Remove
                </button>
              </div>
            </div>

            <!-- Quantity Input -->
            <div class="mb-3">
              <label for="amount" class="form-label fw-medium">Quantity</label>
              <input
                type="number"
                class="form-control"
                id="amount"
                min="1"
                placeholder="Enter quantity"
              />
            </div>

            <!-- Reason Input -->
            <div class="mb-3">
              <label for="reason_msg" class="form-label fw-medium"
                >Reason</label
              >
              <textarea
                name="reason_msg"
                id="reason_msg"
                class="w-100 form-control"
                rows="3"
                placeholder="Enter reason for adjustment..."
              ></textarea>
            </div>
          </div>

          <div
            class="modal-footer px-4 py-3 border-top d-flex gap-2 justify-content-end"
          >
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="updateStockBtn">
              Update Stock
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- Load navbar content -->
    <script>
      fetch("./navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          document.querySelector(
            ".nav-item a[href='./stock-adjustment.html']",
          ).style.cssText = `background-color: #1C222B; color: #fff`;
        });
    </script>

    <script src="../js/auth/getUser.js" type="module"></script>
    <script src="../js/features/stock-adjustment.js" type="module"></script>
  </body>
</html>
