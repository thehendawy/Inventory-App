<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>purchase-orders</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/purchase-orders.css" />

    <script src="../js/auth/authentication.js"></script>
  </head>
  <body>
    <div class="purchase-orders d-flex">
      <div id="navbar-container"></div>

      <main class="flex-grow-1" style="min-width: 0">
        <div class="container mt-3 px-4 py-2">
          <!-- Header -->
          <div
            class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3"
          >
            <div>
              <h2 class="header-title mb-1">Purchase Orders</h2>
              <p class="header-sub mb-0">
                Manage your purchase orders and restocking
              </p>
            </div>
            <button
              type="button"
              class="btn btn-primary btn-new-order w-100 w-md-auto d-block d-md-inline-block"
              data-bs-toggle="modal"
              data-bs-target="#createOrderModal"
            >
              <i class="fa-solid fa-plus"></i> New Order
            </button>
          </div>

          <!-- Search Card -->
          <div class="search-card mt-4">
            <div class="input-group search-box">
              <span class="input-group-text"
                ><i class="fa-solid fa-magnifying-glass"></i
              ></span>
              <input
                type="text"
                class="form-control shadow-none"
                placeholder="Search orders..."
                id="searchOrders"
              />
            </div>
          </div>

          <!-- Table Card -->
          <div class="table-card mt-3">
            <div class="table-header-info">
              <h5 class="fw-bold mb-1">All Orders</h5>
              <p class="text-muted small mb-0">Your purchase orders history</p>
            </div>

            <div class="table-responsive">
              <table class="table mb-0 table-hover text-nowrap">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Supplier</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th class="text-center">Actions</th>
                  </tr>
                </thead>
                <tbody id="purchaseBody">
                  <!-- <tr>
                    <td class="fw-medium">PO-001</td>
                    <td>Apple Inc.</td>
                    <td>MacBook Pro 14"</td>
                    <td>25</td>
                    <td class="fw-bold">$49,975</td>
                    <td><span class="badge-received">Received</span></td>
                    <td class="text-muted">2024-03-10</td>
                    <td class="text-center d-flex justify-content-center">
                      <button
                        type="button"
                        class="btn btn-link text-dark p-0"
                        data-bs-toggle="modal"
                        data-bs-target="#orderDetailsModal"
                      >
                        <i class="fa-regular fa-eye"></i>
                      </button>

                      <button class="action-btn check-btn" title="Approve">
                        <i class="far fa-check-circle"></i>
                      </button>

                      <button class="action-btn cancel-btn" title="Cancel">
                        <i class="far fa-times-circle"></i>
                      </button>
                    </td>
                  </tr> -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal -->
    <div
      class="modal fade"
      id="createOrderModal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3 shadow-lg" style="border-radius: 12px">
          <!--Header-->
          <div class="modal-header border-0 pb-0">
            <div>
              <h5 class="modal-title fw-bold" id="modalTitle">
                Create Purchase Order
              </h5>
              <p class="text-muted small mb-0">
                Create a new purchase order for restocking.
              </p>
            </div>
            <button
              type="button"
              class="btn-close align-self-start"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <form>
              <!-- product -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Product</label>
                <select
                  class="form-select text-muted"
                  required
                  id="productOptions"
                ></select>
                <p class="text-danger mb-0 d-none" id="selectProductErr">
                  *select the product please
                </p>
              </div>
              <!-- supplier
              <div class="mb-3">
                <label class="form-label fw-semibold">Supplier</label>
                <select
                  class="form-select text-muted"
                  required
                  id="supplierOptions"
                ></select>
              </div> -->

              <div class="mb-3">
                <label class="form-label fw-semibold">Quantity</label>
                <input
                  type="number"
                  class="form-control"
                  id="quantityInput"
                  placeholder="0"
                />
                <p class="text-danger mb-0 d-none" id="quantityErr">
                  *select enter the quantity
                </p>
              </div>
            </form>
          </div>

          <!-- buttons -->
          <div class="modal-footer border-0 pt-0 justify-content-end">
            <button
              type="button"
              class="btn btn-outline-secondary px-4 me-2"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="createOrderBtn"
              class="btn btn-primary px-4"
            >
              Create Order
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- !=======> Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- !==========> Load navbar content -->
    <script>
      fetch("./navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("navbar-container").innerHTML = html;
          document.querySelector(
            ".nav-item a[href='./purchase-orders.html']",
          ).style.cssText = `background-color: #1C222B; color: #fff`;
        });
    </script>

    <script src="../js/auth/getUser.js" type="module"></script>
    <script src="../js/features/purchase-orders.js" type="module"></script>
  </body>
</html>
