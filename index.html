<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="signin min-vh-100 p-1" style="background-color: #f3f5f9">
      <div class="container">
        <div
          class="login-logo d-flex align-items-center mt-5 flex-column gap-2"
        >
          <div
            class="d-flex align-items-center justify-content-center rounded-3"
            style="width: 55px; height: 55px; background-color: #2563eb"
          >
            <i class="fa-solid fa-cube text-white fs-4"></i>
          </div>
          <h1 class="fw-bold h3 mb-0">Inventory Manager</h1>
          <p>Manage your inventory with ease</p>
        </div>

        <div
          class="shadow-lg mt-3 bg-white p-4 mx-auto rounded-4"
          style="max-width: 500px"
        >
          <h3>Login</h3>

          <div class="signin-inputs">
            <div class="my-3">
              <label for="emailInput" class="form-label fw-medium"
                >Email address</label
              >
              <input
                type="email"
                class="form-control"
                id="emailInput"
                placeholder="name@example.com"
              />
            </div>

            <div class="my-3">
              <label for="passwordInput" class="form-label fw-medium"
                >Password</label
              >
              <input
                type="password"
                class="form-control"
                id="passwordInput"
                placeholder="Enter your password"
              />
            </div>
            <button class="btn btn-primary w-100 mt-2" id="loginBtn">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="alertErr"
      class="alert alert-danger position-absolute"
      style="
        top: 20px;
        right: 20px;
        width: 250px;
        opacity: 0;
        transition: opacity 500ms;
      "
      role="alert"
    >
      Email or password is invalid
    </div>

    <script src="./js/features/login.js" type="module"></script>
  </body>
</html>
